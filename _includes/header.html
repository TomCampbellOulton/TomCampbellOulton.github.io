<header class="site-header" id="site-header" role="banner">
  <div class="nav-inner">

    <!-- Logo -->
    <a href="{{ site.baseurl }}/" class="nav-logo" aria-label="{{ site.author.name }} — home">
      {{ site.author.name }}
      <span class="logo-dot">.</span>
    </a>

    <!-- Mobile toggle -->
    <div class="nav-actions">
      <!-- Theme toggle (visible always) -->
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle colour theme" title="Switch theme">
        <!-- Sun -->
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/>
          <line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/>
          <line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <!-- Moon -->
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
        </svg>
      </button>

      <button class="nav-toggle" id="nav-toggle"
              aria-controls="nav-menu"
              aria-expanded="false"
              aria-label="Toggle navigation">
        <span></span><span></span><span></span>
      </button>
    </div>

    <!-- Desktop / mobile menu -->
    <nav class="nav-menu" id="nav-menu" aria-label="Main navigation">
      <a href="{{ site.baseurl }}/"              class="nav-link">Home</a>
      <a href="{{ site.baseurl }}/projects"       class="nav-link">Projects</a>
      <a href="{{ site.baseurl }}/certifications" class="nav-link">Certifications</a>
      <a href="{{ site.baseurl }}/about"          class="nav-link">About</a>
    </nav>

  </div>
</header>
