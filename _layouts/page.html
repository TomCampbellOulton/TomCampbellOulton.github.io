---
layout: default
---

<section class="page-hero">
  <div class="container">
    <p class="section-label page-hero__eyebrow reveal">{{ page.label | default: page.title }}</p>
    <h1 class="page-hero__title reveal delay-1">{{ page.title }}</h1>
    {% if page.description %}
      <p class="page-hero__desc reveal delay-2">{{ page.description }}</p>
    {% endif %}
  </div>
</section>

<div class="container">
  <div class="page-content">
    {{ content }}
  </div>
</div>
