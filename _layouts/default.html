<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />

  <title>{% if page.title %}{{ page.title }} · {{ site.author.name }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}" />

  <!-- Fonts: Playfair Display + DM Sans + JetBrains Mono -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet" />

  <!-- Devicons for tech stack icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@v2.15.1/devicon.min.css" />

  <!-- Main stylesheet -->
  <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/main.css" />

  <!-- Inline: prevent flash of wrong theme -->
  <script>
    (function(){
      var s = localStorage.getItem('pf-theme');
      if (!s) s = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', s);
    })();
  </script>

  <!-- SEO tag (jekyll-seo-tag) -->
  {% seo %}
</head>
<body>

  {% include header.html %}

  <main id="main-content">{{ content }}</main>

  {% include footer.html %}

  <script src="{{ site.baseurl }}/assets/js/main.js"></script>
</body>
</html>
